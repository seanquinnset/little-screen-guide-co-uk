name: Show update suggestion → PR

on:
  issues:
    types: [opened]

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'show-update')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and create PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Parse form fields from the issue body
            function parseField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\s*([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const showName = parseField('Show name');
            const updateType = parseField('What needs updating\\?');
            const details = parseField('Details');

            if (!showName) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: '⚠️ Could not parse a show name from this issue. Please make sure the "Show name" field is filled in.',
              });
              return;
            }

            const slug = showName
              .toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');

            // Create a branch with a placeholder commit so we can open a PR
            const branch = `update-show/${slug}-${issue.number}`;

            const { data: ref } = await github.rest.git.getRef({
              ...context.repo,
              ref: 'heads/main',
            });

            await github.rest.git.createRef({
              ...context.repo,
              ref: `refs/heads/${branch}`,
              sha: ref.object.sha,
            });

            // Create an empty commit on the branch so the PR can be opened
            const { data: mainCommit } = await github.rest.git.getCommit({
              ...context.repo,
              commit_sha: ref.object.sha,
            });

            const { data: newCommit } = await github.rest.git.createCommit({
              ...context.repo,
              message: `Placeholder for update to ${showName} (see #${issue.number})`,
              tree: mainCommit.tree.sha,
              parents: [ref.object.sha],
            });

            await github.rest.git.updateRef({
              ...context.repo,
              ref: `heads/${branch}`,
              sha: newCommit.sha,
            });

            // Create the PR
            const prBody = [
              `## Show update suggestion`,
              ``,
              `**Show:** ${showName}`,
              `**What needs updating:** ${updateType}`,
              ``,
              `### Details`,
              details,
              ``,
              `Closes #${issue.number}`,
              ``,
              `### To do`,
              `- [ ] Review the suggested change`,
              `- [ ] Update \`shows.json\` with the change`,
              `- [ ] Re-run \`fetch-posters.js\` if poster/description needs refreshing`,
            ].join('\n');

            await github.rest.pulls.create({
              ...context.repo,
              title: `Update show: ${showName}`,
              body: prBody,
              head: branch,
              base: 'main',
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `Thanks for the feedback! A PR has been created to track this update to **${showName}**. We'll review and action it.`,
            });
